<!DOCTYPE html>
<html>
<button onclick="veranderTekst()">Klik mij</button>
<p id="tekst">Dit is de originele tekst</p>

<script>
function veranderTekst() {
    document.getElementById("tekst").innerText = "Je hebt geklikt!";
}
</script>
<head>
    <title>Mijn eerste app</title>
</head>
<body>
    <h1>Hallo Anne 👋</h1>
    <p>Mijn eerste web app werkt!</p>
</body>
</html>
